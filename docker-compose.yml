services:
  backend:
    build:
      context: ./backend
    container_name: ews-reference-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ews-reference-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
